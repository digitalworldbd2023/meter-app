<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মিটার মাস্টার প্রো - অনলাইন সিঙ্ক</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print { body * { visibility: hidden; } #printableArea, #printableArea * { visibility: visible; } #printableArea { position: absolute; left: 0; top: 0; width: 100%; } .no-print { display: none !important; } }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #6366f1; }
        .modal { transition: opacity 0.25s ease; z-index: 100; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">

    <script>
        // আপনার গুগল অ্যাপ স্ক্রিপ্ট লিঙ্কটি এখানে দিন
        const GOOGLE_SHEET_URL = 'আপনার_নতুন_ডেপ্লয়_লিঙ্ক_এখানে_দিন';
    </script>

    <div id="manualModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-lg z-50 overflow-y-auto">
            <div class="modal-content py-6 px-6">
                <div class="flex justify-between items-center pb-3 border-b">
                    <p id="modalTitle" class="text-xl font-bold text-indigo-700">কাস্টমার তথ্য</p>
                    <button onclick="toggleModal()" class="text-2xl font-bold text-gray-400">✕</button>
                </div>
                <input type="hidden" id="editIndex">
                <div class="space-y-4 mt-6">
                    <input type="text" id="newMeter" placeholder="মিটার নাম্বার" class="w-full p-3 border rounded-xl font-bold outline-none">
                    <input type="text" id="newName" placeholder="গ্রাহকের নাম" class="w-full p-3 border rounded-xl font-bold outline-none">
                    <input type="text" id="newAcc" placeholder="একাউন্ট নাম্বার" class="w-full p-3 border rounded-xl font-bold outline-none">
                    <input type="number" id="newPrev" placeholder="পূর্বের রিডিং" class="w-full p-3 border rounded-xl font-bold outline-none">
                </div>
                <button onclick="saveCustomerToMaster()" class="w-full mt-6 py-4 bg-indigo-600 rounded-xl text-white font-bold hover:bg-indigo-700">মাস্টার সিটে সেভ করুন</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6 no-print border-b-4 border-indigo-200">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold italic text-xl">M</div>
                <div><h1 class="text-2xl font-black text-indigo-700 uppercase italic">METER MASTER PRO</h1><p id="dateNow" class="text-gray-400 text-xs font-bold mt-1"></p></div>
            </div>
            <div id="timeNow" class="mt-4 md:mt-0 bg-slate-800 px-8 py-2 rounded-full text-white font-mono font-extrabold text-xl shadow-inner tracking-tighter">00:00:00</div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-print">
            <button onclick="openManualInput()" class="bg-indigo-600 text-white p-4 rounded-2xl shadow-md font-bold text-sm">➕ নতুন গ্রাহক</button>
            <button id="syncBtn" onclick="syncFromSheet()" class="bg-blue-500 text-white p-4 rounded-2xl shadow-md font-bold text-sm">🔄 সিঙ্ক করুন</button>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-[10px] text-gray-400 font-bold uppercase">মোট কাস্টমার</p><h2 id="totalCust" class="text-xl font-black text-indigo-700">0</h2></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-[10px] text-gray-400 font-bold uppercase">আজকের এন্ট্রি</p><h2 id="todayCount" class="text-xl font-black text-emerald-600">0</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 no-print">
            <div class="bg-white p-4 rounded-2xl shadow-md border-2 border-indigo-100"><div id="reader"></div></div>
            <div class="bg-white p-6 rounded-2xl shadow-md flex flex-col justify-between border-t-8 border-indigo-600">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="meterNum" oninput="findCustomer()" placeholder="মিটার নং..." class="p-3 bg-indigo-50 border rounded-lg font-black text-indigo-800 outline-none">
                        <input type="number" id="prevReading" readonly placeholder="আগের রিডিং" class="p-3 bg-gray-50 border rounded-lg font-bold text-gray-400">
                    </div>
                    <div id="custCard" class="p-4 bg-slate-50 rounded-xl border flex items-center justify-center text-center h-24"><div id="custInfo" class="text-gray-400 italic text-sm">মিটার নম্বর লিখলে গ্রাহক তথ্য এখানে দেখাবে...</div></div>
                    <input type="number" id="currReading" placeholder="বর্তমান রিডিং" class="w-full p-4 border-4 border-emerald-400 rounded-2xl text-4xl font-black text-center text-emerald-700 outline-none">
                </div>
                <button onclick="saveEntry()" class="mt-4 bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl active:scale-95 shadow-xl">💾 সেভ ও ব্যাকআপ</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm no-print mb-8 border border-indigo-50">
            <h3 class="font-black text-gray-700 uppercase text-xs mb-4 italic">📋 কাস্টমার মাস্টার লিস্ট (এডিট ও ডিলিট)</h3>
            <div class="overflow-x-auto max-h-60 border rounded-xl">
                <table class="w-full text-left">
                    <thead class="bg-indigo-600 text-white text-[10px] uppercase sticky top-0">
                        <tr><th class="p-2 border">মিটার নং</th><th class="p-2 border">নাম</th><th class="p-2 border">একাউন্ট</th><th class="p-2 border text-center">অ্যাকশন</th></tr>
                    </thead>
                    <tbody id="masterTableBody" class="text-[11px] font-medium text-gray-600 italic"></tbody>
                </table>
            </div>
        </div>

        <div id="printableArea" class="bg-white rounded-2xl shadow-sm overflow-hidden border">
            <div class="p-4 bg-gray-800 text-white flex justify-between items-center no-print">
                <h3 class="font-bold text-xs uppercase tracking-widest">মাসিক রিপোর্ট তালিকা</h3>
                <div class="flex gap-2"><button onclick="exportToExcel()" class="bg-amber-500 px-4 py-1 rounded-full text-[10px] font-bold">এক্সেল</button><button onclick="window.print()" class="bg-white text-black px-4 py-1 rounded-full text-[10px] font-bold">প্রিন্ট</button></div>
            </div>
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 text-[10px] md:text-xs uppercase font-black text-center">
                    <tr><th class="p-4 border">একাউন্ট</th><th class="p-4 border">নাম</th><th class="p-4 border">মিটার</th><th class="p-4 border">আগের</th><th class="p-4 border">বর্তমান</th><th class="p-4 border bg-indigo-50 text-indigo-700">ইউনিট</th><th class="p-4 border no-print">মুছুন</th></tr>
                </thead>
                <tbody id="entryTable" class="text-xs md:text-sm font-medium text-center"></tbody>
            </table>
        </div>
    </div>

    <script>
        const beep = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
        let masterList = JSON.parse(localStorage.getItem('masterList')) || [];
        let dailyEntries = JSON.parse(localStorage.getItem('dailyEntries')) || [];

        function toggleModal() { document.getElementById('manualModal').classList.toggle('opacity-0'); document.getElementById('manualModal').classList.toggle('pointer-events-none'); }
        function openManualInput() { document.getElementById('modalTitle').innerText = "নতুন গ্রাহক যোগ করুন"; document.getElementById('editIndex').value = ""; document.getElementById('newMeter').value = ""; document.getElementById('newName').value = ""; document.getElementById('newAcc').value = ""; document.getElementById('newPrev').value = "0"; toggleModal(); }

        // ১. শিট থেকে তথ্য সিঙ্ক করার ফাংশন
        async function syncFromSheet() {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "সিঙ্ক হচ্ছে...";
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const data = await response.json();
                if(data && data.length > 0) {
                    masterList = data;
                    localStorage.setItem('masterList', JSON.stringify(masterList));
                    refreshUI();
                    alert("গুগল শিট থেকে " + data.length + " জন গ্রাহকের তথ্য আপডেট হয়েছে!");
                }
            } catch (err) { alert("সিঙ্ক করতে সমস্যা হয়েছে। ইন্টারনেট চেক করুন।"); }
            btn.innerText = "🔄 সিঙ্ক করুন";
        }

        function editMasterData(index) {
            const c = masterList[index];
            document.getElementById('modalTitle').innerText = "তথ্য সংশোধন করুন";
            document.getElementById('editIndex').value = index;
            document.getElementById('newMeter').value = c.meter;
            document.getElementById('newName').value = c.name;
            document.getElementById('newAcc').value = c.acc;
            document.getElementById('newPrev').value = c.prev;
            toggleModal();
        }

        async function deleteMasterData(index) {
            if (confirm("এটি গুগল সিট থেকেও মুছে যাবে। ডিলিট করবেন?")) {
                const customer = masterList[index];
                if (GOOGLE_SHEET_URL.startsWith('http')) {
                    fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "MASTER_DELETE", meter: customer.meter }) });
                }
                masterList.splice(index, 1);
                localStorage.setItem('masterList', JSON.stringify(masterList));
                refreshUI();
            }
        }

        async function saveCustomerToMaster() {
            const index = document.getElementById('editIndex').value;
            const data = { type: "MASTER_SAVE", meter: document.getElementById('newMeter').value.trim(), name: document.getElementById('newName').value.trim(), acc: document.getElementById('newAcc').value.trim(), prev: document.getElementById('newPrev').value || 0 };
            if(!data.meter || !data.name || !data.acc) return alert("সব তথ্য দিন!");
            if(index === "") masterList.push(data); else masterList[index] = data;
            localStorage.setItem('masterList', JSON.stringify(masterList));
            if (GOOGLE_SHEET_URL.startsWith('http')) { fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); }
            refreshUI(); toggleModal();
        }

        function findCustomer() {
            const val = document.getElementById('meterNum').value.trim();
            const customer = masterList.find(c => String(c.meter) === val);
            if (customer) {
                document.getElementById('custInfo').innerHTML = `<b class="text-indigo-700 text-lg">${customer.name}</b><br><small class="font-bold">A/C: ${customer.acc}</small>`;
                document.getElementById('prevReading').value = customer.prev;
            } else { document.getElementById('custInfo').innerText = "খুঁজে পাওয়া যায়নি!"; document.getElementById('prevReading').value = ""; }
        }

        async function saveEntry() {
            const meterNum = document.getElementById('meterNum').value;
            const curr = document.getElementById('currReading').value;
            const customer = masterList.find(c => String(c.meter) === meterNum);
            if (customer && curr !== "") {
                const entry = { type: "READING_SAVE", acc: customer.acc, name: customer.name, meter: meterNum, prev: customer.prev, curr: curr, unit: (curr - customer.prev).toFixed(2) };
                dailyEntries.unshift(entry);
                localStorage.setItem('dailyEntries', JSON.stringify(dailyEntries));
                if (GOOGLE_SHEET_URL.startsWith('http')) { fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) }); }
                beep.play(); refreshUI(); document.getElementById('meterNum').value = ''; document.getElementById('currReading').value = '';
            } else { alert("মিটার ও রিডিং চেক করুন!"); }
        }

        function refreshUI() {
            const eBody = document.getElementById('entryTable');
            const mBody = document.getElementById('masterTableBody');
            eBody.innerHTML = ''; mBody.innerHTML = '';
            masterList.forEach((c, i) => {
                mBody.innerHTML += `<tr class="border-b"><td class="p-2 border font-bold text-indigo-700">${c.meter}</td><td class="p-2 border">${c.name}</td><td class="p-2 border font-mono">${c.acc}</td><td class="p-2 border text-center flex justify-center gap-1"><button onclick="editMasterData(${i})" class="bg-blue-500 text-white px-2 py-1 rounded text-[9px] font-bold">ইডিট</button><button onclick="deleteMasterData(${i})" class="bg-red-500 text-white px-2 py-1 rounded text-[9px] font-bold">ডিলিট</button></td></tr>`;
            });
            dailyEntries.forEach((e, i) => {
                eBody.innerHTML += `<tr class="border-b"><td class="p-4 border font-mono">${e.acc}</td><td class="p-4 border font-bold text-left">${e.name}</td><td class="p-4 border font-black text-indigo-700">${e.meter}</td><td class="p-4 border">${e.prev}</td><td class="p-4 border font-bold text-emerald-600">${e.curr}</td><td class="p-4 border font-black text-indigo-800 bg-indigo-50">${e.unit}</td><td class="p-4 border no-print"><button onclick="deleteEntry(${i})" class="text-red-300">✕</button></td></tr>`;
            });
            document.getElementById('totalCust').innerText = masterList.length; document.getElementById('todayCount').innerText = dailyEntries.length;
        }

        function deleteEntry(i) { if(confirm('মুছবেন?')) { dailyEntries.splice(i, 1); localStorage.setItem('dailyEntries', JSON.stringify(dailyEntries)); refreshUI(); } }
        function exportToExcel() { const ws = XLSX.utils.json_to_sheet(dailyEntries); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "Report.xlsx"); }

        setInterval(() => { const d = new Date(); document.getElementById('timeNow').innerText = d.toLocaleTimeString(); document.getElementById('dateNow').innerText = d.toLocaleDateString('bn-BD', { day:'numeric', month:'long', year:'numeric' }); }, 1000);
        const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
        scanner.render((text) => { document.getElementById('meterNum').value = text; findCustomer(); document.getElementById('currReading').focus(); });
        refreshUI();
    </script>
</body>
</html>
